on:
  workflow_dispatch:
  push:
  pull_request:

jobs:
  build-base:
    runs-on: "ubuntu-latest"
    steps:
      - uses: "actions/checkout@v6"

      - run: |
          echo "DOCKER_IMAGE_NAME=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - uses: "docker/setup-buildx-action@v4"

      - uses: "docker/login-action@v4"
        with:
          username: "yeicor"
          password: "${{ secrets.DOCKERHUB_TOKEN }}"

      - uses: "docker/build-push-action@v7"
        with:
          context: "."
          file: "./Dockerfile.base"
          push: "${{ github.ref == 'refs/heads/main' }}"
          tags: "${{ env.DOCKER_IMAGE_NAME }}-base:latest"
          cache-from: "type=registry,ref=${{ env.DOCKER_IMAGE_NAME }}-base:buildcache"
          cache-to: "type=registry,ref=${{ env.DOCKER_IMAGE_NAME }}-base:buildcache,mode=max"

  build-and-push:
    needs: build-base
    runs-on: "ubuntu-latest"
    strategy:
      fail-fast: false
      matrix:
        include:
          - cuda_enabled: "0"
            prefix: "cpu"
          - cuda_enabled: "1"
            prefix: "cuda"
    steps:
      - uses: "actions/checkout@v6"
        with:
          submodules: "recursive"

      - run: |
          echo "DOCKER_IMAGE_NAME=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
          IMAGE_DATE="$(date +'%Y-%m-%d')"
          git submodule foreach --recursive 'git fetch --tags'
          COLMAP_DESC="$(git -C colmap tag --list --sort=-authordate | head -n 1)-$(git -C colmap rev-parse --short HEAD)"
          OPENMVS_DESC="$(git -C openMVS tag --list --sort=-authordate | head -n 1)-$(git -C openMVS rev-parse --short HEAD)"
          echo "IMAGE_TAG=${IMAGE_DATE}-colmap-${COLMAP_DESC}-openmvs-${OPENMVS_DESC}" >> $GITHUB_ENV

      - uses: "docker/setup-buildx-action@v4"

      - uses: "docker/login-action@v4"
        with:
          username: "yeicor"
          password: "${{ secrets.DOCKERHUB_TOKEN }}"

      - uses: "docker/build-push-action@v7"
        with:
          context: "."
          file: "./Dockerfile"
          build-args: |
            BASE_IMAGE=${{ env.DOCKER_IMAGE_NAME }}-base:latest
            CUDA_ENABLED=${{ matrix.cuda_enabled }}
          push: "${{ github.ref == 'refs/heads/main' }}"
          tags: |
            ${{ env.DOCKER_IMAGE_NAME }}:${{ matrix.prefix }}-${{ env.IMAGE_TAG }}
            ${{ env.DOCKER_IMAGE_NAME }}:${{ matrix.prefix }}-latest
          cache-from: "type=registry,ref=${{ env.DOCKER_IMAGE_NAME }}:${{ matrix.prefix }}-buildcache"
          cache-to: "type=registry,ref=${{ env.DOCKER_IMAGE_NAME }}:${{ matrix.prefix }}-buildcache,mode=max"