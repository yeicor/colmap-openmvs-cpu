name: Build and Push

on:
  workflow_dispatch:
    inputs:
      force-rebuild:
        description: 'Force rebuild all stages'
        type: boolean
        default: false
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: docker.io

jobs:
  image-metadata:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      is_main: ${{ steps.meta.outputs.is_main }}
      is_tag: ${{ steps.meta.outputs.is_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - id: meta
        run: |
          set -euo pipefail

          DATE="$(date +'%Y%m%d')"
          SHORT_SHA="${GITHUB_SHA:0:8}"

          COLMAP_TAG="$(git -C colmap describe --tags --abbrev=0 2>/dev/null || echo 'v0.0')"
          COLMAP_VER="${COLMAP_TAG#v}"
          COLMAP_SHA="$(git -C colmap rev-parse --short HEAD || echo '0000')"

          OPENMVS_TAG="$(git -C openMVS describe --tags --abbrev=0 2>/dev/null || echo 'v0.0')"
          OPENMVS_VER="${OPENMVS_TAG#v}"
          OPENMVS_SHA="$(git -C openMVS rev-parse --short HEAD || echo '0000')"

          TAG="${DATE}-colmap${COLMAP_VER}-${COLMAP_SHA}-openmvs${OPENMVS_VER}-${OPENMVS_SHA}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            echo "is_main=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_main=false" >> "$GITHUB_OUTPUT"
          fi

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "is_tag=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_tag=false" >> "$GITHUB_OUTPUT"
          fi

  build-base:
    needs: image-metadata
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: yeicor
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: imranmsc/clear-actions-cache@v1
        if: ${{ inputs.force-rebuild }}

      - name: Build base image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.base
          push: ${{ needs.image-metadata.outputs.is_tag == 'true' || needs.image-metadata.outputs.is_main == 'true' }}
          platforms: linux/amd64,linux/arm64
          tags: |
            yeicor/colmap-base:latest
            yeicor/colmap-base:${{ needs.image-metadata.outputs.tag }}
          cache-from: type=gha,scope=base
          cache-to: type=gha,scope=base,mode=max
          provenance: false
          sbom: true

  build-app:
    needs: [image-metadata, build-base]
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: cpu
            platforms: linux/amd64,linux/arm64
            base: yeicor/colmap-base:latest
            cuda: "0"
          - variant: cuda
            platforms: linux/amd64
            base: nvidia/cuda:12.9.1-devel-ubuntu24.04
            cuda: "1"

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - uses: imranmsc/clear-actions-cache@v1
        if: ${{ inputs.force-rebuild }}

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: yeicor
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ needs.image-metadata.outputs.is_tag == 'true' || needs.image-metadata.outputs.is_main == 'true' }}
          platforms: ${{ matrix.platforms }}
          build-args: |
            BASE_IMAGE=${{ matrix.base }}
            CUDA_ENABLED=${{ matrix.cuda }}
          tags: |
            yeicor/colmap-openmvs-${{ matrix.variant }}:${{ needs.image-metadata.outputs.tag }}
            yeicor/colmap-openmvs-${{ matrix.variant }}:latest
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,scope=${{ matrix.variant }},mode=max
          provenance: true
          sbom: true

      - name: Extract debug artifacts
        if: ${{ !cancelled() && !success() }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: debug-artifacts
          outputs: type=local,dest=./debug-${{ matrix.variant }}
          build-args: |
            BASE_IMAGE=${{ matrix.base }}
            CUDA_ENABLED=${{ matrix.cuda }}

      - name: Upload debug artifacts
        if: ${{ !cancelled() && !success() }}
        uses: actions/upload-artifact@v4
        with:
          name: debug-${{ matrix.variant }}
          path: ./debug-${{ matrix.variant }}
          retention-days: 7

  debug-logs:
    needs: [image-metadata, build-app]
    runs-on: ubuntu-latest
    if: failure()
    steps:
      - name: Show failure summary
        run: |
          echo "## Build Failed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Check the attached debug artifacts for vcpkg buildtrees and logs." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Common issues:" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Missing system dependencies - check apt install in Dockerfile.base" >> "$GITHUB_STEP_SUMMARY"
          echo "2. vcpkg triplet issues - verify x64-linux works for your platform" >> "$GITHUB_STEP_SUMMARY"
          echo "3. CUDA architecture - try CUDA_ARCHITECTURES=75" >> "$GITHUB_STEP_SUMMARY"

  verify:
    needs: [image-metadata, build-app]
    runs-on: ubuntu-latest
    if: ${{ needs.image-metadata.outputs.is_tag == 'true' }}
    steps:
      - name: Verify images work
        run: |
          for variant in cpu cuda; do
            IMG="yeicor/colmap-openmvs-$variant:${{ needs.image-metadata.outputs.tag }}"
            echo "Verifying $IMG..."
            docker pull "$IMG" || continue

            if [ "$variant" = "cuda" ]; then
              docker run --rm --gpus all "$IMG" --help 2>&1 | head -5 || true
            else
              docker run --rm "$IMG" --help 2>&1 | head -5 || true
            fi
          done
