on:
  # Trigger the action manually from the UI
  workflow_dispatch:
  # Trigger the action when pushing to certain branches
  push:
  pull_request:

jobs:
  compute-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - id: tag
        run: |
          git submodule foreach --recursive 'git fetch --tags'
          IMAGE_DATE="$(date +'%Y-%m-%d')"
          COLMAP_DESC="$(git -C colmap tag --list --sort=-authordate | head -n 1)-$(git -C colmap rev-parse --short HEAD)"
          OPENMVS_DESC="$(git -C openMVS tag --list --sort=-authordate | head -n 1)-$(git -C openMVS rev-parse --short HEAD)"
          echo "image_tag=${IMAGE_DATE}-colmap-${COLMAP_DESC}-openmvs-${OPENMVS_DESC}" >> $GITHUB_OUTPUT

  build-and-push:
    needs: compute-tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: cpu
            base_image: "ubuntu:24.04"
            cuda_enabled: "0"
          - variant: cuda
            base_image: "nvidia/cuda:12.9.1-devel-ubuntu24.04"
            cuda_enabled: "1"

    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          username: "yeicor"
          password: "${{ secrets.DOCKERHUB_TOKEN }}"

      - uses: docker/build-push-action@v7
        with:
          context: "."
          file: "./Dockerfile"
          build-args: |
            BASE_IMAGE=${{ matrix.base_image }}
            CUDA_ENABLED=${{ matrix.cuda_enabled }}
          push: "${{ github.ref == 'refs/heads/main' }}"
          tags: |
            yeicor/colmap-openmvs-${{ matrix.variant }}:${{ needs.compute-tag.outputs.image_tag }}
            yeicor/colmap-openmvs-${{ matrix.variant }}:latest
          cache-from: "type=registry,ref=yeicor/colmap-openmvs-${{ matrix.variant }}:buildcache"
          cache-to: "type=registry,ref=yeicor/colmap-openmvs-${{ matrix.variant }}:buildcache,mode=max"

