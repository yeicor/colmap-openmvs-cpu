on:
  workflow_dispatch:
    inputs:
      no_cache:
        description: "Skip downloading the cache, starting with a clean state. Note: cache upload will still be performed."
        required: false
        default: "false"
      build_debug:
        description: "Build debug images (with debug symbols). Disabled by default."
        required: false
        default: "false"
        type: boolean
  push:
    branches: [main, "renovate/*"]
  pull_request:

jobs:
  meta:
    runs-on: ubuntu-24.04
    outputs:
      image: ${{ steps.meta.outputs.image }}
      user: ${{ steps.meta.outputs.user }}
      tag: ${{ steps.meta.outputs.tag }}
      is_push: ${{ steps.meta.outputs.is_push }}
    steps:
      - name: Compute metadata
        id: meta
        run: |
          echo "image=${{ vars.DOCKER_IMAGE_NAME }}" >> $GITHUB_OUTPUT
          echo "user=$(echo "${{ vars.DOCKER_IMAGE_NAME }}" | cut -d'/' -f1)" >> $GITHUB_OUTPUT

          SHORT_SHA="${GITHUB_SHA::7}"
          echo "tag=${SHORT_SHA}" >> $GITHUB_OUTPUT

          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF}" == "refs/heads/main" ]]; then
            echo "is_push=true" >> $GITHUB_OUTPUT
          else
            echo "is_push=false" >> $GITHUB_OUTPUT
          fi

  build:
    needs: meta
    strategy:
      fail-fast: false
      matrix:
        variant: [cpu, cuda]
        arch: [amd64, arm64]
        build_type: [Release, Debug]
        include:
          # Native runners
          - arch: amd64
            runner: ubuntu-24.04
            platform: linux/amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
            arch_tag: arm64
          # Variants
          - variant: cpu
            BASE_IMAGE: mirror.gcr.io/library/ubuntu:24.04
            RUNTIME_IMAGE: mirror.gcr.io/library/ubuntu:24.04
          - variant: cuda
            BASE_IMAGE: mirror.gcr.io/nvidia/cuda:13.2.1-devel-ubuntu24.04
            RUNTIME_IMAGE: mirror.gcr.io/nvidia/cuda:13.2.1-runtime-ubuntu24.04
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Check if should run
        id: check_skip
        run: |
          if [[ "${{ matrix.build_type }}" == "Release" ]] || [[ "${{ matrix.build_type }}" == "Debug" && "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.build_debug }}" == "true" ]]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi
      - uses: actions/checkout@v6
        if: steps.check_skip.outputs.should_run == 'true'
        with:
          submodules: recursive
      - name: Set up Buildx
        id: setup-buildx
        if: steps.check_skip.outputs.should_run == 'true'
        uses: docker/setup-buildx-action@v4
      - name: Download vcpkg cache artifact
        if: steps.check_skip.outputs.should_run == 'true' && github.event.inputs.no_cache != 'true'
        uses: yeicor/action-download-artifact@v1.0.1
        with:
          name: docker-cache-mounts-${{ matrix.variant }}-${{ matrix.arch }}-${{ matrix.build_type }}
          search_artifacts: true
          path: cache-mounts
          if_no_artifact_found: ignore
          use_unzip: true
      - name: Docker cache mounts (restore)
        if: steps.check_skip.outputs.should_run == 'true'
        uses: reproducible-containers/buildkit-cache-dance@v3
        with:
          builder: ${{ steps.setup-buildx.outputs.name }}
          cache-dir: cache-mounts
          dockerfile: Dockerfile
          skip-extraction: true
      - name: Build
        if: steps.check_skip.outputs.should_run == 'true'
        timeout-minutes: 240
        run: |
          BUILD_ARGS=""
          IMAGE_SUFFIX=""
          if [ "${{ matrix.build_type }}" = "Debug" ]; then
            BUILD_ARGS="--build-arg BUILD_TYPE=Debug"
            IMAGE_SUFFIX="-debug"
          fi

          if ! docker buildx build \
            --build-arg BASE_IMAGE=${{ matrix.BASE_IMAGE }} \
            --build-arg RUNTIME_IMAGE=${{ matrix.RUNTIME_IMAGE }} \
            ${BUILD_ARGS} \
            --tag ${{ needs.meta.outputs.image }}:${{ matrix.variant }}${IMAGE_SUFFIX}-${{ matrix.arch }}-${{ needs.meta.outputs.tag }} \
            --load .; then
            echo "::warning::First build failed. Pruning all builder cache (including mount caches) and retrying from scratch."
            docker buildx prune --force --builder ${{ steps.setup-buildx.outputs.name }} || true
            docker buildx build --no-cache \
              --build-arg BASE_IMAGE=${{ matrix.BASE_IMAGE }} \
              --build-arg RUNTIME_IMAGE=${{ matrix.RUNTIME_IMAGE }} \
              ${BUILD_ARGS} \
              --tag ${{ needs.meta.outputs.image }}:${{ matrix.variant }}${IMAGE_SUFFIX}-${{ matrix.arch }}-${{ needs.meta.outputs.tag }} \
              --load .
          fi
      - name: Docker cache mounts (extract)
        if: steps.check_skip.outputs.should_run == 'true' && !cancelled()
        uses: reproducible-containers/buildkit-cache-dance@v3
        with:
          builder: ${{ steps.setup-buildx.outputs.name }}
          cache-dir: cache-mounts
          dockerfile: Dockerfile
        env:
          STATE_POST: "true"
      - name: Disable post docker cache mounts (extract)
        if: steps.check_skip.outputs.should_run == 'true'
        run: echo "" > Dockerfile
      - name: Upload docker cache mounts
        if: steps.check_skip.outputs.should_run == 'true' && !cancelled()
        uses: actions/upload-artifact@v7
        with:
          name: docker-cache-mounts-${{ matrix.variant }}-${{ matrix.arch }}-${{ matrix.build_type }}
          path: |
            cache-mounts
            !cache-mounts/**/*:*
          retention-days: 7
      - name: Save some disk space
        if: steps.check_skip.outputs.should_run == 'true'
        run: |
          rm -rf cache-mounts
      - name: Save built image as artifact
        if: steps.check_skip.outputs.should_run == 'true'
        run: |
          IMAGE_SUFFIX=""
          if [ "${{ matrix.build_type }}" = "Debug" ]; then
            IMAGE_SUFFIX="-debug"
          fi
          docker save ${{ needs.meta.outputs.image }}:${{ matrix.variant }}${IMAGE_SUFFIX}-${{ matrix.arch }}-${{ needs.meta.outputs.tag }} -o docker-image-${{ matrix.variant }}-${{ matrix.arch }}-${{ matrix.build_type }}-${{ needs.meta.outputs.tag }}.tar
      - name: Upload built image as artifact
        if: steps.check_skip.outputs.should_run == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: docker-image-${{ matrix.variant }}-${{ matrix.arch }}-${{ matrix.build_type }}-${{ needs.meta.outputs.tag }}
          path: docker-image-${{ matrix.variant }}-${{ matrix.arch }}-${{ matrix.build_type }}-${{ needs.meta.outputs.tag }}.tar
          retention-days: 1

  test:
    needs: [meta, build]
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
        include:
          # Native runners
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: docker-image-cpu-${{ matrix.arch }}-Release-${{ needs.meta.outputs.tag }}
      - run: docker load -i docker-image-*.tar && rm docker-image-*.tar
      - name: Download and extract test dataset
        run: |
          # CC BY-NC-SA 4.0: https://www.eth3d.net/datasets
          mkdir -p test_obj/images tmp
          curl -L -o dataset.7z https://www.eth3d.net/data/door_dslr_jpg.7z
          7z x dataset.7z -otmp
          find tmp -type f -name "*.JPG" -exec mv {} test_obj/images/ \;
          # Downscale images to speed up testing
          sudo apt-get update
          sudo apt-get install -y imagemagick
          find test_obj/images -type f -name "*.JPG" -exec mogrify -resize 25% {} \;
          rm -rf tmp dataset.7z
      - name: Run docker container for testing
        timeout-minutes: 90
        run: docker run --user $UID:$GID --rm -v ${{ github.workspace }}/test_obj:/work ${{ needs.meta.outputs.image }}:cpu-${{ matrix.arch }}-${{ needs.meta.outputs.tag }} /usr/bin/bash /entrypoint.sh /work -v
      - name: Upload results (fail if missing)
        uses: actions/upload-artifact@v7
        with:
          name: test-output-${{ matrix.arch }}
          path: |
            test_obj/colmap
            test_obj/openmvs
          if-no-files-found: error

  publish:
    needs: [meta, test]
    runs-on: ubuntu-24.04
    if: needs.meta.outputs.is_push == 'true'
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: docker-image-*-Release-*
          merge-multiple: true
      - run: for img in docker-image-*.tar; do docker load -i $img && rm $img; done
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ needs.meta.outputs.user }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Create and push multi-arch manifest
        run: |
          for variant in cpu cuda; do
            # Push individual architecture images. Needed for multi-arch manifest to work.
            docker push ${{ needs.meta.outputs.image }}:${variant}-amd64-${{ needs.meta.outputs.tag }}
            docker push ${{ needs.meta.outputs.image }}:${variant}-arm64-${{ needs.meta.outputs.tag }}

            # Create multi-arch manifest for this variant
            docker manifest create ${{ needs.meta.outputs.image }}:${variant}-${{ needs.meta.outputs.tag }} --amend ${{ needs.meta.outputs.image }}:${variant}-amd64-${{ needs.meta.outputs.tag }} --amend ${{ needs.meta.outputs.image }}:${variant}-arm64-${{ needs.meta.outputs.tag }}

            # Push multi-arch manifest
            docker manifest push ${{ needs.meta.outputs.image }}:${variant}-${{ needs.meta.outputs.tag }}

            # Also update ${variant}-latest manifest
            docker manifest create ${{ needs.meta.outputs.image }}:${variant}-latest --amend ${{ needs.meta.outputs.image }}:${variant}-amd64-${{ needs.meta.outputs.tag }} --amend ${{ needs.meta.outputs.image }}:${variant}-arm64-${{ needs.meta.outputs.tag }}
            docker manifest push ${{ needs.meta.outputs.image }}:${variant}-latest
          done

  success: # For auto-merging rules
    needs: test
    if: always()
    runs-on: ubuntu-24.04
    steps:
      - name: Check dependency status
        if: needs.test.result != 'success'
        run: |
          echo "Required tests did not succeed (status: ${{ needs.test.result }})"
          exit 1
