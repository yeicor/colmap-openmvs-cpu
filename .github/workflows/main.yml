on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

jobs:
  meta:
    runs-on: ubuntu-24.04
    outputs:
      image: ${{ steps.meta.outputs.image }}
      user: ${{ steps.meta.outputs.user }}
      tag: ${{ steps.meta.outputs.tag }}
      is_push: ${{ steps.meta.outputs.is_push }}
    steps:
      - name: Compute metadata
        id: meta
        run: |
          echo "image=${{ vars.DOCKER_IMAGE_NAME }}" >> $GITHUB_OUTPUT
          echo "user=$(echo "${{ vars.DOCKER_IMAGE_NAME }}" | cut -d'/' -f1)" >> $GITHUB_OUTPUT
          
          IMAGE_DATE="$(date +'%Y-%m-%d')"
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "tag=${IMAGE_DATE}-${SHORT_SHA}" >> $GITHUB_OUTPUT

          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF}" == "refs/heads/main" ]]; then
            echo "is_push=true" >> $GITHUB_OUTPUT
          else
            echo "is_push=false" >> $GITHUB_OUTPUT
          fi

  build:
    needs: meta
    strategy:
      fail-fast: false
      matrix:
        variant: [cpu, cuda]
        arch: [amd64, arm64]
        include:
          # Native runners
          - arch: amd64
            runner: ubuntu-24.04
            platform: linux/amd64
            arch_tag: amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
            arch_tag: arm64
          # Variants
          - variant: cpu
            BASE_IMAGE: ubuntu:24.04
            RUNTIME_IMAGE: ubuntu:24.04
            CUDA_ENABLED: OFF
            tag_prefix: cpu
          - variant: cuda
            BASE_IMAGE: nvidia/cuda:12.9.1-devel-ubuntu24.04
            RUNTIME_IMAGE: nvidia/cuda:12.9.1-runtime-ubuntu24.04
            CUDA_ENABLED: ON
            tag_prefix: cuda
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Login to Docker Hub
        if: needs.meta.outputs.is_push == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ needs.meta.outputs.user }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up Buildx
        id: setup-buildx
        uses: docker/setup-buildx-action@v4
      - name: Cache
        uses: actions/cache@v4
        id: cache
        with:
          path: cache-mount
          key: cache-mount-${{ hashFiles('Dockerfile') }}
      - name: Docker cache mounts (restore)
        uses: reproducible-containers/buildkit-cache-dance@v3
        with:
          builder: ${{ steps.setup-buildx.outputs.name }}
          cache-dir: cache-mount
          dockerfile: Dockerfile
          skip-extraction: true # disable post-step (done manually)
      - name: Build (and push if main)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ needs.meta.outputs.is_push == 'true' }}
          platforms: ${{ matrix.platform }}
          cache-from: type=registry,ref=${{ needs.meta.outputs.image }}:buildcache
          cache-to: type=registry,ref=${{ needs.meta.outputs.image }}:buildcache,mode=max
          build-args: |
            BASE_IMAGE=${{ matrix.BASE_IMAGE }}
            RUNTIME_IMAGE=${{ matrix.RUNTIME_IMAGE }}
            CUDA_ENABLED=${{ matrix.CUDA_ENABLED }}
          provenance: true
          sbom: true
          tags: ${{ needs.meta.outputs.image }}:${{ matrix.tag_prefix }}-${{ needs.meta.outputs.tag }}-${{ matrix.arch_tag }}-wip
      - name: Docker cache mounts (extract)
        if: "!cancelled()"
        uses: reproducible-containers/buildkit-cache-dance@v3
        with:
          builder: ${{ steps.setup-buildx.outputs.name }}
          cache-dir: cache-mount
          dockerfile: Dockerfile
        env:
          STATE_POST: "true" # Hack to force extract = true for the action
      - name: Upload vcpkg cached data as artifact (for debugging purposes)
        if: "!cancelled()"
        uses: actions/upload-artifact@v4
        with:
          name: vcpkg-cached-${{ matrix.variant }}-${{ matrix.arch }}
          path: cache-mount
          retention-days: 1
  
  test:
    needs: [meta, build]
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Download Buddha dataset
        run: |
          git clone --depth 1 https://github.com/alicevision/dataset_buddha.git
          mkdir -p data
          cp -r dataset_buddha/buddha_mini6 data/
      - name: Prepare dataset structure
        run: |
          mkdir -p test_obj/images
          cp data/buddha_mini6/*.jpg test_obj/images/
      - name: Run pipeline (CPU only for CI)
        run: |
          docker run --rm \
            -v $PWD/test_obj:/data \
            ${{ needs.meta.outputs.image }}:cpu-${{ needs.meta.outputs.tag }}-amd64 \
            /data
      - name: Upload results (fail if missing)
        uses: actions/upload-artifact@v4
        with:
          name: dataset_buddha-test-output
          path: test_obj/openmvs/scene_dense_mesh_refined_textured.*
          if-no-files-found: error

  manifest:
    needs: [meta, test]
    if: needs.meta.outputs.is_push == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ needs.meta.outputs.user }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Create multi-arch manifests
        run: |
          for variant in cpu cuda; do
            # Create multi-arch manifest
            docker buildx imagetools create \
              -t ${IMAGE}:${variant}-${TAG} \
              -t ${IMAGE}:${variant}-latest \
              ${IMAGE}:${variant}-${TAG}-amd64-wip \
              ${IMAGE}:${variant}-${TAG}-arm64-wip
            # Delete temporary wip tags
            docker buildx imagetools rm \
              ${IMAGE}:${variant}-${TAG}-amd64-wip || true
            docker buildx imagetools rm \
              ${IMAGE}:${variant}-${TAG}-arm64-wip || true
          done
        env:
          IMAGE: ${{ needs.meta.outputs.image }}
          TAG: ${{ needs.meta.outputs.tag }}